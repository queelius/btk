<!DOCTYPE html>
<html lang="en" data-theme="auto">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>bookmark-memex</title>
<style>
:root {
  --bg: #ffffff;
  --bg-elev: #f6f7f9;
  --fg: #1a1a1a;
  --fg-muted: #5a5a5a;
  --border: #e4e6ea;
  --accent: #2563eb;
  --accent-muted: #dbeafe;
  --tag-bg: #eef2ff;
  --tag-fg: #3730a3;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
               "Helvetica Neue", Arial, sans-serif;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #0f1419;
    --bg-elev: #161b22;
    --fg: #e6e6e6;
    --fg-muted: #8b949e;
    --border: #30363d;
    --accent: #58a6ff;
    --accent-muted: #1f2d3d;
    --tag-bg: #1e2a3a;
    --tag-fg: #79b8ff;
  }
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg); }
body {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  font-size: 15px;
  line-height: 1.5;
}
header {
  position: sticky;
  top: 0;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  padding: 10px 16px;
  display: flex;
  gap: 12px;
  align-items: center;
  z-index: 10;
}
header h1 {
  margin: 0;
  font-size: 1.05rem;
  font-weight: 600;
  letter-spacing: 0.2px;
}
header a {
  color: inherit;
  text-decoration: none;
}
#search {
  flex: 1;
  padding: 7px 10px;
  border: 1px solid var(--border);
  background: var(--bg-elev);
  color: var(--fg);
  border-radius: 6px;
  font-size: 14px;
}
#search:focus { outline: 2px solid var(--accent); outline-offset: -1px; }
#status { font-size: 12px; color: var(--fg-muted); }
main {
  flex: 1;
  padding: 16px;
  max-width: 960px;
  margin: 0 auto;
  width: 100%;
}
.bookmark {
  padding: 12px 14px;
  border: 1px solid var(--border);
  border-radius: 8px;
  margin-bottom: 10px;
  background: var(--bg-elev);
}
.bookmark h3 {
  margin: 0 0 4px 0;
  font-size: 1rem;
  font-weight: 600;
}
.bookmark h3 a { color: var(--accent); text-decoration: none; }
.bookmark h3 a:hover { text-decoration: underline; }
.bookmark .url { font-size: 12px; color: var(--fg-muted); word-break: break-all; }
.bookmark .desc { margin: 6px 0 0; color: var(--fg-muted); font-size: 13px; }
.bookmark .tags { margin-top: 6px; display: flex; flex-wrap: wrap; gap: 4px; }
.tag {
  display: inline-block;
  padding: 2px 8px;
  background: var(--tag-bg);
  color: var(--tag-fg);
  border-radius: 12px;
  font-size: 11px;
  font-weight: 500;
  text-decoration: none;
  cursor: pointer;
}
.tag:hover { filter: brightness(0.95); }
.empty {
  text-align: center;
  color: var(--fg-muted);
  padding: 48px 16px;
  font-size: 14px;
}
.section-head {
  color: var(--fg-muted);
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin: 18px 0 8px;
}
.annotation {
  border-left: 3px solid var(--accent-muted);
  padding: 6px 10px;
  margin: 8px 0;
  color: var(--fg-muted);
  font-size: 13px;
  background: var(--bg-elev);
  border-radius: 0 4px 4px 0;
}
.breadcrumb {
  color: var(--fg-muted);
  font-size: 13px;
  margin-bottom: 10px;
}
.breadcrumb a { color: var(--accent); text-decoration: none; }
footer {
  padding: 16px;
  text-align: center;
  color: var(--fg-muted);
  font-size: 11px;
  border-top: 1px solid var(--border);
}
</style>
</head>
<body>
<header>
  <h1><a href="#/">bookmark-memex</a></h1>
  <input id="search" placeholder="Search title, url, description, or tag..." autofocus />
  <span id="status">Loading...</span>
</header>
<main id="view"></main>
<footer>
  Generated by bookmark-memex. All data is local; no network requests.
</footer>

<!-- In single-file mode the Python exporter replaces this <script src> with
     an inline <script>…</script> containing the full sql-wasm.js body.
     In directory mode it stays a sibling-file reference. -->
<script src="sql-wasm.js"></script>
<!-- In single-file mode the Python exporter fills these two empty script
     tags with base64-encoded bytes: the sql-wasm.wasm binary and the
     gzipped database. In directory mode they stay empty and the loader
     falls back to fetching sibling files. -->
<script id="bm-wasm-b64" type="application/base64"></script>
<script id="bm-db-b64" type="application/base64"></script>
<script>
(async function () {
  "use strict";

  const view = document.getElementById("view");
  const searchEl = document.getElementById("search");
  const statusEl = document.getElementById("status");

  // ── Inline-asset helpers (single-file mode) ──────────────────────────────
  function readInlineBase64(id) {
    const el = document.getElementById(id);
    if (!el) return "";
    const txt = el.textContent || "";
    return txt.trim();
  }

  function base64ToBytes(b64) {
    const bin = atob(b64.replace(/\s/g, ""));
    const out = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) out[i] = bin.charCodeAt(i);
    return out;
  }

  // ── DOM helpers (all output uses textContent; no string-composed HTML) ───
  function el(tag, attrs, ...children) {
    const node = document.createElement(tag);
    if (attrs) {
      for (const k of Object.keys(attrs)) {
        if (k === "class") node.className = attrs[k];
        else if (k === "text") node.textContent = attrs[k];
        else if (k.startsWith("data-")) node.setAttribute(k, attrs[k]);
        else node.setAttribute(k, attrs[k]);
      }
    }
    for (const c of children) {
      if (c === null || c === undefined) continue;
      if (typeof c === "string") node.appendChild(document.createTextNode(c));
      else node.appendChild(c);
    }
    return node;
  }

  function clear(node) {
    while (node.firstChild) node.removeChild(node.firstChild);
  }

  // ── Decompression helper (used by both inline and sibling DB sources) ────
  async function gunzip(bytes) {
    const stream = new Blob([bytes]).stream().pipeThrough(
      new DecompressionStream("gzip")
    );
    const buf = await new Response(stream).arrayBuffer();
    return new Uint8Array(buf);
  }

  // ── sql.js init: use inline wasm bytes when present, else sibling file ──
  async function initSql() {
    const wasmB64 = readInlineBase64("bm-wasm-b64");
    if (wasmB64) {
      const wasmBinary = base64ToBytes(wasmB64);
      return initSqlJs({
        wasmBinary,
        locateFile: () => "data:application/wasm;base64,", // never used when wasmBinary set
      });
    }
    return initSqlJs({ locateFile: f => f });
  }

  // ── Load compressed DB: prefer inline base64, else fetch sibling ──────────
  async function loadDb() {
    const SQL = await initSql();

    const dbB64 = readInlineBase64("bm-db-b64");
    if (dbB64) {
      const gz = base64ToBytes(dbB64);
      const raw = await gunzip(gz);
      return new SQL.Database(raw);
    }

    // Directory mode: try gzipped, fall back to raw.
    try {
      const resp = await fetch("bookmarks.db.gz");
      if (!resp.ok) throw new Error("no .db.gz");
      const stream = resp.body.pipeThrough(new DecompressionStream("gzip"));
      const buf = await new Response(stream).arrayBuffer();
      return new SQL.Database(new Uint8Array(buf));
    } catch (_) {
      const resp2 = await fetch("bookmarks.db");
      if (!resp2.ok) throw new Error("could not fetch database");
      const buf = await resp2.arrayBuffer();
      return new SQL.Database(new Uint8Array(buf));
    }
  }

  // ── Query helpers ─────────────────────────────────────────────────────────
  function all(db, sql, params) {
    const stmt = db.prepare(sql);
    stmt.bind(params || []);
    const rows = [];
    while (stmt.step()) rows.push(stmt.getAsObject());
    stmt.free();
    return rows;
  }

  function fetchRecent(db, limit) {
    return all(db,
      "SELECT id, unique_id, url, title, description, added " +
      "FROM bookmarks " +
      "WHERE archived_at IS NULL " +
      "ORDER BY added DESC LIMIT ?",
      [limit || 50]
    );
  }

  function fetchBySearch(db, q) {
    const like = "%" + q + "%";
    return all(db,
      "SELECT DISTINCT b.id, b.unique_id, b.url, b.title, b.description, b.added " +
      "FROM bookmarks b " +
      "LEFT JOIN bookmark_tags bt ON bt.bookmark_id = b.id " +
      "LEFT JOIN tags t ON t.id = bt.tag_id " +
      "WHERE b.archived_at IS NULL AND (" +
      "  b.title LIKE ? OR b.url LIKE ? OR b.description LIKE ? OR t.name LIKE ?" +
      ") " +
      "ORDER BY b.added DESC LIMIT 200",
      [like, like, like, like]
    );
  }

  function fetchByTag(db, tag) {
    return all(db,
      "SELECT b.id, b.unique_id, b.url, b.title, b.description, b.added " +
      "FROM bookmarks b " +
      "JOIN bookmark_tags bt ON bt.bookmark_id = b.id " +
      "JOIN tags t ON t.id = bt.tag_id " +
      "WHERE b.archived_at IS NULL AND t.name = ? " +
      "ORDER BY b.added DESC",
      [tag]
    );
  }

  function fetchBookmark(db, uid) {
    const rows = all(db,
      "SELECT * FROM bookmarks WHERE unique_id = ? AND archived_at IS NULL LIMIT 1",
      [uid]
    );
    return rows[0] || null;
  }

  function fetchTagsFor(db, bookmarkId) {
    return all(db,
      "SELECT t.name FROM tags t " +
      "JOIN bookmark_tags bt ON bt.tag_id = t.id " +
      "WHERE bt.bookmark_id = ? ORDER BY t.name",
      [bookmarkId]
    ).map(r => r.name);
  }

  function fetchAnnotationsFor(db, bookmarkId) {
    return all(db,
      "SELECT id, text, created_at, updated_at FROM annotations " +
      "WHERE bookmark_id = ? AND archived_at IS NULL " +
      "ORDER BY created_at DESC",
      [bookmarkId]
    );
  }

  function fetchPopularTags(db, limit) {
    return all(db,
      "SELECT t.name AS name, COUNT(*) AS cnt " +
      "FROM tags t JOIN bookmark_tags bt ON bt.tag_id = t.id " +
      "JOIN bookmarks b ON b.id = bt.bookmark_id " +
      "WHERE b.archived_at IS NULL " +
      "GROUP BY t.name ORDER BY cnt DESC, t.name ASC LIMIT ?",
      [limit || 20]
    );
  }

  // ── DOM builders ──────────────────────────────────────────────────────────
  function buildTagLink(name, suffix) {
    const anchor = el("a", {
      class: "tag",
      href: "#/tag/" + encodeURIComponent(name)
    });
    anchor.textContent = suffix ? name + " " + suffix : name;
    return anchor;
  }

  function buildBookmarkCard(bm, tags) {
    const card = el("article", { class: "bookmark" });
    const h3 = el("h3");
    const link = el("a", { href: "#/bookmark/" + encodeURIComponent(bm.unique_id) });
    link.textContent = bm.title || bm.url;
    h3.appendChild(link);
    card.appendChild(h3);

    const urlEl = el("div", { class: "url" });
    urlEl.textContent = bm.url;
    card.appendChild(urlEl);

    if (bm.description) {
      const desc = el("p", { class: "desc" });
      desc.textContent = bm.description;
      card.appendChild(desc);
    }

    if (tags && tags.length) {
      const tagBox = el("div", { class: "tags" });
      tags.forEach(t => tagBox.appendChild(buildTagLink(t)));
      card.appendChild(tagBox);
    }
    return card;
  }

  function buildBookmarkList(rows, db) {
    if (!rows.length) {
      const p = el("p", { class: "empty" });
      p.textContent = "No matching bookmarks.";
      return p;
    }
    const frag = document.createDocumentFragment();
    for (const bm of rows) {
      frag.appendChild(buildBookmarkCard(bm, fetchTagsFor(db, bm.id)));
    }
    return frag;
  }

  function buildBookmarkDetail(bm, db) {
    const frag = document.createDocumentFragment();
    if (!bm) {
      const p = el("p", { class: "empty" });
      p.textContent = "Bookmark not found (may have been archived).";
      frag.appendChild(p);
      return frag;
    }
    const crumb = el("div", { class: "breadcrumb" });
    const back = el("a", { href: "#/" });
    back.textContent = "← back";
    crumb.appendChild(back);
    frag.appendChild(crumb);

    const tags = fetchTagsFor(db, bm.id);

    const card = el("article", { class: "bookmark" });
    const h3 = el("h3");
    const extLink = el("a", {
      href: bm.url,
      target: "_blank",
      rel: "noopener noreferrer"
    });
    extLink.textContent = bm.title || bm.url;
    h3.appendChild(extLink);
    card.appendChild(h3);

    const urlEl = el("div", { class: "url" });
    urlEl.textContent = bm.url;
    card.appendChild(urlEl);

    if (bm.description) {
      const desc = el("p", { class: "desc" });
      desc.textContent = bm.description;
      card.appendChild(desc);
    }

    if (tags.length) {
      const tagBox = el("div", { class: "tags" });
      tags.forEach(t => tagBox.appendChild(buildTagLink(t)));
      card.appendChild(tagBox);
    }
    frag.appendChild(card);

    const anns = fetchAnnotationsFor(db, bm.id);
    if (anns.length) {
      const head = el("div", { class: "section-head" });
      head.textContent = "Annotations (" + anns.length + ")";
      frag.appendChild(head);
      for (const a of anns) {
        const n = el("div", { class: "annotation" });
        n.textContent = a.text;
        frag.appendChild(n);
      }
    }
    return frag;
  }

  function buildHome(db) {
    const frag = document.createDocumentFragment();
    const tags = fetchPopularTags(db, 20);
    if (tags.length) {
      const head = el("div", { class: "section-head" });
      head.textContent = "Popular tags";
      frag.appendChild(head);
      const tagBox = el("div", { class: "tags" });
      tags.forEach(t => tagBox.appendChild(buildTagLink(t.name, "(" + t.cnt + ")")));
      frag.appendChild(tagBox);
    }
    const head2 = el("div", { class: "section-head" });
    head2.textContent = "Recent bookmarks";
    frag.appendChild(head2);
    frag.appendChild(buildBookmarkList(fetchRecent(db, 50), db));
    return frag;
  }

  function buildSearch(db, q) {
    const frag = document.createDocumentFragment();
    const crumb = el("div", { class: "breadcrumb" });
    crumb.textContent = 'Search results for "' + q + '"';
    frag.appendChild(crumb);
    frag.appendChild(buildBookmarkList(fetchBySearch(db, q), db));
    return frag;
  }

  function buildTag(db, tag) {
    const frag = document.createDocumentFragment();
    const crumb = el("div", { class: "breadcrumb" });
    crumb.textContent = "Tag: " + tag;
    frag.appendChild(crumb);
    frag.appendChild(buildBookmarkList(fetchByTag(db, tag), db));
    return frag;
  }

  // ── Routing ───────────────────────────────────────────────────────────────
  function parseRoute() {
    const hash = location.hash || "#/";
    const body = hash.slice(1).replace(/^\//, "");
    if (!body) return { name: "home" };
    const parts = body.split("/");
    if (parts[0] === "search" && parts.length >= 2) {
      return { name: "search", q: decodeURIComponent(parts.slice(1).join("/")) };
    }
    if (parts[0] === "tag" && parts.length >= 2) {
      return { name: "tag", tag: decodeURIComponent(parts.slice(1).join("/")) };
    }
    if (parts[0] === "bookmark" && parts.length === 2) {
      return { name: "bookmark", uid: decodeURIComponent(parts[1]) };
    }
    return { name: "home" };
  }

  function render(db) {
    const route = parseRoute();
    if (route.name === "search" && searchEl.value !== route.q) {
      searchEl.value = route.q;
    }
    clear(view);
    if (route.name === "home") {
      view.appendChild(buildHome(db));
    } else if (route.name === "search") {
      view.appendChild(buildSearch(db, route.q));
    } else if (route.name === "tag") {
      view.appendChild(buildTag(db, route.tag));
    } else if (route.name === "bookmark") {
      view.appendChild(buildBookmarkDetail(fetchBookmark(db, route.uid), db));
    }
  }

  // ── Boot ──────────────────────────────────────────────────────────────────
  try {
    const db = await loadDb();
    statusEl.textContent = "Ready";
    render(db);
    window.addEventListener("hashchange", () => render(db));

    let searchTimer = 0;
    searchEl.addEventListener("input", () => {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(() => {
        const q = searchEl.value.trim();
        if (!q) {
          if (location.hash !== "#/") location.hash = "#/";
        } else {
          location.hash = "#/search/" + encodeURIComponent(q);
        }
      }, 140);
    });
  } catch (err) {
    console.error(err);
    clear(view);
    const p = document.createElement("p");
    p.className = "empty";
    p.textContent = "Could not load database: " + (err.message || String(err));
    view.appendChild(p);
    statusEl.textContent = "Error";
  }
})();
</script>
</body>
</html>
