<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>bookmark-memex</title>
<style>
/* -- palette (dark default; light via data-theme attribute) ---------- */
:root {
  /* dark theme (walnut + amber) */
  --bg: #1a1714;
  --bg-surface: #221e1a;
  --bg-overlay: #2b2620;
  --bg-elevated: #322c25;
  --text: #e8e1d3;
  --text-muted: #938c7e;
  --text-subtle: #6e685c;
  --text-strong: #f7f1e4;
  --text-accent: #d4a46a;
  --border: #3a342c;
  --border-strong: #4a4238;
  --border-accent: #d4a46a;
  --badge-bg: rgba(212, 164, 106, 0.14);
  --badge-text: #e8c088;
  --selection: rgba(212, 164, 106, 0.18);
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.3);
  --shadow-md: 0 4px 14px rgba(0,0,0,0.35);
  /* layout + typography */
  --header-height: 56px;
  --content-max-width: 780px;
  --font-sans: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  --font-serif: "Iowan Old Style", "Palatino", "Georgia", serif;
  --font-mono: "JetBrains Mono", "Fira Code", "SF Mono", ui-monospace, Menlo, monospace;
  --font-size: 14px;
  --font-size-sm: 12px;
  --font-size-lg: 15px;
  --font-size-xl: 18px;
  --radius-sm: 4px;
  --radius: 8px;
  --radius-lg: 12px;
  --gap: 10px;
  --gap-sm: 6px;
  --gap-lg: 18px;
  --gap-xl: 28px;
}

:root[data-theme="light"] {
  /* light theme (cream + bronze) */
  --bg: #faf7f0;
  --bg-surface: #f2ede2;
  --bg-overlay: #ffffff;
  --bg-elevated: #ffffff;
  --text: #2e2820;
  --text-muted: #7a7162;
  --text-subtle: #a39a8a;
  --text-strong: #1a1610;
  --text-accent: #8a5a2b;
  --border: #e4ddce;
  --border-strong: #cfc6b2;
  --border-accent: #8a5a2b;
  --badge-bg: #f3e6d0;
  --badge-text: #6e4520;
  --selection: rgba(138, 90, 43, 0.14);
  --shadow-sm: 0 1px 2px rgba(60, 42, 20, 0.08);
  --shadow-md: 0 4px 14px rgba(60, 42, 20, 0.10);
}

*,
*::before,
*::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html, body {
  min-height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-sans);
  font-size: var(--font-size);
  line-height: 1.5;
}

::selection { background: var(--selection); }
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

body { display: flex; flex-direction: column; }

/* -- header ---------------------------------------------------------- */
header#top {
  position: sticky;
  top: 0;
  height: var(--header-height);
  background: var(--bg-surface);
  border-bottom: 1px solid var(--border);
  padding: 0 var(--gap-lg);
  display: flex;
  gap: var(--gap);
  align-items: center;
  z-index: 10;
}

#brand {
  color: var(--text-strong);
  font-family: var(--font-serif);
  font-size: var(--font-size-xl);
  font-weight: 600;
  letter-spacing: 0.3px;
  text-decoration: none;
  flex-shrink: 0;
}

#search {
  flex: 1;
  padding: 8px 12px;
  border: 1px solid var(--border);
  background: var(--bg-overlay);
  color: var(--text);
  font-family: inherit;
  font-size: var(--font-size);
  border-radius: var(--radius-sm);
  min-width: 120px;
}
#search:focus {
  outline: none;
  border-color: var(--border-accent);
  box-shadow: 0 0 0 3px var(--badge-bg);
}

#status { font-size: var(--font-size-sm); color: var(--text-muted); }

.btn.icon-btn {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-muted);
  font-size: var(--font-size-lg);
  padding: 6px 10px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: background 0.15s, color 0.15s, border-color 0.15s;
}
.btn.icon-btn:hover {
  background: var(--bg-elevated);
  color: var(--text-strong);
  border-color: var(--border-strong);
}

/* -- main ------------------------------------------------------------ */
main {
  flex: 1;
  padding: var(--gap-lg);
  max-width: var(--content-max-width);
  margin: 0 auto;
  width: 100%;
}

.section-head {
  color: var(--text-subtle);
  font-size: var(--font-size-sm);
  text-transform: uppercase;
  letter-spacing: 0.6px;
  margin: var(--gap-lg) 0 var(--gap) 0;
  font-weight: 600;
}

.breadcrumb {
  color: var(--text-muted);
  font-size: var(--font-size-sm);
  margin-bottom: var(--gap);
}
.breadcrumb a { color: var(--text-accent); text-decoration: none; }
.breadcrumb a:hover { text-decoration: underline; }

/* -- bookmark cards -------------------------------------------------- */
.bookmark {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: var(--gap) var(--gap-lg);
  margin-bottom: var(--gap);
  box-shadow: var(--shadow-sm);
}

.bookmark h3 {
  font-family: var(--font-serif);
  font-size: var(--font-size-lg);
  font-weight: 600;
  margin-bottom: 2px;
}
.bookmark h3 a {
  color: var(--text-strong);
  text-decoration: none;
}
.bookmark h3 a:hover { color: var(--text-accent); }

.bookmark .url {
  font-family: var(--font-mono);
  font-size: var(--font-size-sm);
  color: var(--text-subtle);
  word-break: break-all;
}

.bookmark .desc {
  margin-top: var(--gap-sm);
  color: var(--text-muted);
  font-size: var(--font-size);
}

.bookmark .tags {
  margin-top: var(--gap-sm);
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
}

.tag {
  display: inline-block;
  padding: 2px 10px;
  background: var(--badge-bg);
  color: var(--badge-text);
  border-radius: 999px;
  font-size: var(--font-size-sm);
  font-weight: 500;
  text-decoration: none;
  line-height: 1.5;
}
.tag:hover { filter: brightness(1.1); }

/* -- marginalia (notes attached to bookmarks) ------------------------ */
.marginalia {
  border-left: 3px solid var(--border-accent);
  padding: var(--gap-sm) var(--gap);
  margin: var(--gap-sm) 0;
  color: var(--text);
  font-size: var(--font-size);
  font-family: var(--font-serif);
  background: var(--bg-surface);
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
}

/* -- empty state ----------------------------------------------------- */
.empty {
  text-align: center;
  color: var(--text-muted);
  padding: var(--gap-xl) var(--gap-lg);
  font-size: var(--font-size);
  font-family: var(--font-serif);
}

/* -- footer ---------------------------------------------------------- */
footer {
  padding: var(--gap-lg);
  text-align: center;
  color: var(--text-subtle);
  font-size: var(--font-size-sm);
  border-top: 1px solid var(--border);
}
</style>
</head>
<body>
<header id="top">
  <a id="brand" href="#/">bookmark-memex</a>
  <input id="search" placeholder="Search title, url, description, or tag..." autofocus />
  <span id="status">loading…</span>
  <button class="btn icon-btn" id="theme-toggle" title="toggle light/dark mode">&#9790;</button>
</header>
<main id="view"></main>
<footer>
  Generated by bookmark-memex. All data is local; no network requests.
</footer>

<!-- In single-file mode the Python exporter replaces this <script src> with
     an inline <script>…</script> containing the full sql-wasm.js body.
     In directory mode it stays a sibling-file reference. -->
<script src="sql-wasm.js"></script>
<!-- In single-file mode the Python exporter fills these two empty script
     tags with base64-encoded bytes: the sql-wasm.wasm binary and the
     gzipped database. In directory mode they stay empty and the loader
     falls back to fetching sibling files. -->
<script id="bm-wasm-b64" type="application/base64"></script>
<script id="bm-db-b64" type="application/base64"></script>
<script>
(async function () {
  "use strict";

  const view = document.getElementById("view");
  const searchEl = document.getElementById("search");
  const statusEl = document.getElementById("status");
  const themeBtn = document.getElementById("theme-toggle");

  // ── Theme (dark default; persisted; OS fallback) ─────────────────────────
  const THEME_KEY = "bookmark_memex_theme";

  function applyTheme(theme) {
    document.documentElement.setAttribute("data-theme", theme);
    if (themeBtn) themeBtn.textContent = theme === "dark" ? "☾" : "☀";
  }

  function initTheme() {
    const saved = localStorage.getItem(THEME_KEY);
    let theme;
    if (saved === "light" || saved === "dark") {
      theme = saved;
    } else {
      theme = window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
    }
    applyTheme(theme);
  }

  function toggleTheme() {
    const current = document.documentElement.getAttribute("data-theme") || "dark";
    const next = current === "dark" ? "light" : "dark";
    applyTheme(next);
    localStorage.setItem(THEME_KEY, next);
  }

  initTheme();
  themeBtn.addEventListener("click", toggleTheme);

  // ── DOM helpers (textContent only; no string-composed HTML) ──────────────
  function el(tag, attrs, ...children) {
    const node = document.createElement(tag);
    if (attrs) {
      for (const k of Object.keys(attrs)) {
        if (k === "class") node.className = attrs[k];
        else if (k === "text") node.textContent = attrs[k];
        else node.setAttribute(k, attrs[k]);
      }
    }
    for (const c of children) {
      if (c === null || c === undefined) continue;
      if (typeof c === "string") node.appendChild(document.createTextNode(c));
      else node.appendChild(c);
    }
    return node;
  }

  function clear(node) {
    while (node.firstChild) node.removeChild(node.firstChild);
  }

  // ── Inline-asset helpers (single-file mode) ──────────────────────────────
  function readInlineBase64(id) {
    const node = document.getElementById(id);
    if (!node) return "";
    const txt = node.textContent || "";
    return txt.trim();
  }

  function base64ToBytes(b64) {
    const bin = atob(b64.replace(/\s/g, ""));
    const out = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) out[i] = bin.charCodeAt(i);
    return out;
  }

  // ── Decompression helper (used by both inline and sibling DB sources) ────
  async function gunzip(bytes) {
    const stream = new Blob([bytes]).stream().pipeThrough(
      new DecompressionStream("gzip")
    );
    const buf = await new Response(stream).arrayBuffer();
    return new Uint8Array(buf);
  }

  // ── sql.js init: use inline wasm bytes when present, else sibling file ──
  async function initSql() {
    const wasmB64 = readInlineBase64("bm-wasm-b64");
    if (wasmB64) {
      const wasmBinary = base64ToBytes(wasmB64);
      return initSqlJs({
        wasmBinary,
        locateFile: () => "data:application/wasm;base64,",
      });
    }
    return initSqlJs({ locateFile: f => f });
  }

  // ── Load compressed DB: prefer inline base64, else fetch sibling ──────────
  async function loadDb() {
    const SQL = await initSql();

    const dbB64 = readInlineBase64("bm-db-b64");
    if (dbB64) {
      const gz = base64ToBytes(dbB64);
      const raw = await gunzip(gz);
      return new SQL.Database(raw);
    }

    try {
      const resp = await fetch("bookmarks.db.gz");
      if (!resp.ok) throw new Error("no .db.gz");
      const stream = resp.body.pipeThrough(new DecompressionStream("gzip"));
      const buf = await new Response(stream).arrayBuffer();
      return new SQL.Database(new Uint8Array(buf));
    } catch (_) {
      const resp2 = await fetch("bookmarks.db");
      if (!resp2.ok) throw new Error("could not fetch database");
      const buf = await resp2.arrayBuffer();
      return new SQL.Database(new Uint8Array(buf));
    }
  }

  // ── Query helpers ─────────────────────────────────────────────────────────
  function all(db, sql, params) {
    const stmt = db.prepare(sql);
    stmt.bind(params || []);
    const rows = [];
    while (stmt.step()) rows.push(stmt.getAsObject());
    stmt.free();
    return rows;
  }

  function fetchRecent(db, limit) {
    return all(db,
      "SELECT id, unique_id, url, title, description, added " +
      "FROM bookmarks " +
      "WHERE archived_at IS NULL " +
      "ORDER BY added DESC LIMIT ?",
      [limit || 50]
    );
  }

  function fetchBySearch(db, q) {
    const like = "%" + q + "%";
    return all(db,
      "SELECT DISTINCT b.id, b.unique_id, b.url, b.title, b.description, b.added " +
      "FROM bookmarks b " +
      "LEFT JOIN bookmark_tags bt ON bt.bookmark_id = b.id " +
      "LEFT JOIN tags t ON t.id = bt.tag_id " +
      "WHERE b.archived_at IS NULL AND (" +
      "  b.title LIKE ? OR b.url LIKE ? OR b.description LIKE ? OR t.name LIKE ?" +
      ") " +
      "ORDER BY b.added DESC LIMIT 200",
      [like, like, like, like]
    );
  }

  function fetchByTag(db, tag) {
    return all(db,
      "SELECT b.id, b.unique_id, b.url, b.title, b.description, b.added " +
      "FROM bookmarks b " +
      "JOIN bookmark_tags bt ON bt.bookmark_id = b.id " +
      "JOIN tags t ON t.id = bt.tag_id " +
      "WHERE b.archived_at IS NULL AND t.name = ? " +
      "ORDER BY b.added DESC",
      [tag]
    );
  }

  function fetchBookmark(db, uid) {
    const rows = all(db,
      "SELECT * FROM bookmarks WHERE unique_id = ? AND archived_at IS NULL LIMIT 1",
      [uid]
    );
    return rows[0] || null;
  }

  function fetchTagsFor(db, bookmarkId) {
    return all(db,
      "SELECT t.name FROM tags t " +
      "JOIN bookmark_tags bt ON bt.tag_id = t.id " +
      "WHERE bt.bookmark_id = ? ORDER BY t.name",
      [bookmarkId]
    ).map(r => r.name);
  }

  function fetchMarginaliaFor(db, bookmarkId) {
    return all(db,
      "SELECT id, text, created_at, updated_at FROM marginalia " +
      "WHERE bookmark_id = ? AND archived_at IS NULL " +
      "ORDER BY created_at DESC",
      [bookmarkId]
    );
  }

  function fetchPopularTags(db, limit) {
    return all(db,
      "SELECT t.name AS name, COUNT(*) AS cnt " +
      "FROM tags t JOIN bookmark_tags bt ON bt.tag_id = t.id " +
      "JOIN bookmarks b ON b.id = bt.bookmark_id " +
      "WHERE b.archived_at IS NULL " +
      "GROUP BY t.name ORDER BY cnt DESC, t.name ASC LIMIT ?",
      [limit || 20]
    );
  }

  // ── DOM builders ──────────────────────────────────────────────────────────
  function buildTagLink(name, suffix) {
    const anchor = el("a", {
      class: "tag",
      href: "#/tag/" + encodeURIComponent(name)
    });
    anchor.textContent = suffix ? name + " " + suffix : name;
    return anchor;
  }

  function buildBookmarkCard(bm, tags) {
    const card = el("article", { class: "bookmark" });
    const h3 = el("h3");
    const link = el("a", { href: "#/bookmark/" + encodeURIComponent(bm.unique_id) });
    link.textContent = bm.title || bm.url;
    h3.appendChild(link);
    card.appendChild(h3);

    const urlEl = el("div", { class: "url" });
    urlEl.textContent = bm.url;
    card.appendChild(urlEl);

    if (bm.description) {
      const desc = el("p", { class: "desc" });
      desc.textContent = bm.description;
      card.appendChild(desc);
    }

    if (tags && tags.length) {
      const tagBox = el("div", { class: "tags" });
      tags.forEach(t => tagBox.appendChild(buildTagLink(t)));
      card.appendChild(tagBox);
    }
    return card;
  }

  function buildBookmarkList(rows, db) {
    if (!rows.length) {
      const p = el("p", { class: "empty" });
      p.textContent = "No matching bookmarks.";
      return p;
    }
    const frag = document.createDocumentFragment();
    for (const bm of rows) {
      frag.appendChild(buildBookmarkCard(bm, fetchTagsFor(db, bm.id)));
    }
    return frag;
  }

  function buildBookmarkDetail(bm, db) {
    const frag = document.createDocumentFragment();
    if (!bm) {
      const p = el("p", { class: "empty" });
      p.textContent = "Bookmark not found (may have been archived).";
      frag.appendChild(p);
      return frag;
    }
    const crumb = el("div", { class: "breadcrumb" });
    const back = el("a", { href: "#/" });
    back.textContent = "← back";
    crumb.appendChild(back);
    frag.appendChild(crumb);

    const tags = fetchTagsFor(db, bm.id);

    const card = el("article", { class: "bookmark" });
    const h3 = el("h3");
    const extLink = el("a", {
      href: bm.url,
      target: "_blank",
      rel: "noopener noreferrer"
    });
    extLink.textContent = bm.title || bm.url;
    h3.appendChild(extLink);
    card.appendChild(h3);

    const urlEl = el("div", { class: "url" });
    urlEl.textContent = bm.url;
    card.appendChild(urlEl);

    if (bm.description) {
      const desc = el("p", { class: "desc" });
      desc.textContent = bm.description;
      card.appendChild(desc);
    }

    if (tags.length) {
      const tagBox = el("div", { class: "tags" });
      tags.forEach(t => tagBox.appendChild(buildTagLink(t)));
      card.appendChild(tagBox);
    }
    frag.appendChild(card);

    const anns = fetchMarginaliaFor(db, bm.id);
    if (anns.length) {
      const head = el("div", { class: "section-head" });
      head.textContent = "Marginalia (" + anns.length + ")";
      frag.appendChild(head);
      for (const a of anns) {
        const n = el("div", { class: "marginalia" });
        n.textContent = a.text;
        frag.appendChild(n);
      }
    }
    return frag;
  }

  function buildHome(db) {
    const frag = document.createDocumentFragment();
    const tags = fetchPopularTags(db, 20);
    if (tags.length) {
      const head = el("div", { class: "section-head" });
      head.textContent = "Popular tags";
      frag.appendChild(head);
      const tagBox = el("div", { class: "tags" });
      tags.forEach(t => tagBox.appendChild(buildTagLink(t.name, "(" + t.cnt + ")")));
      frag.appendChild(tagBox);
    }
    const head2 = el("div", { class: "section-head" });
    head2.textContent = "Recent bookmarks";
    frag.appendChild(head2);
    frag.appendChild(buildBookmarkList(fetchRecent(db, 50), db));
    return frag;
  }

  function buildSearch(db, q) {
    const frag = document.createDocumentFragment();
    const crumb = el("div", { class: "breadcrumb" });
    crumb.textContent = 'Search results for "' + q + '"';
    frag.appendChild(crumb);
    frag.appendChild(buildBookmarkList(fetchBySearch(db, q), db));
    return frag;
  }

  function buildTag(db, tag) {
    const frag = document.createDocumentFragment();
    const crumb = el("div", { class: "breadcrumb" });
    crumb.textContent = "Tag: " + tag;
    frag.appendChild(crumb);
    frag.appendChild(buildBookmarkList(fetchByTag(db, tag), db));
    return frag;
  }

  // ── Routing ───────────────────────────────────────────────────────────────
  function parseRoute() {
    const hash = location.hash || "#/";
    const body = hash.slice(1).replace(/^\//, "");
    if (!body) return { name: "home" };
    const parts = body.split("/");
    if (parts[0] === "search" && parts.length >= 2) {
      return { name: "search", q: decodeURIComponent(parts.slice(1).join("/")) };
    }
    if (parts[0] === "tag" && parts.length >= 2) {
      return { name: "tag", tag: decodeURIComponent(parts.slice(1).join("/")) };
    }
    if (parts[0] === "bookmark" && parts.length === 2) {
      return { name: "bookmark", uid: decodeURIComponent(parts[1]) };
    }
    return { name: "home" };
  }

  function render(db) {
    const route = parseRoute();
    if (route.name === "search" && searchEl.value !== route.q) {
      searchEl.value = route.q;
    }
    clear(view);
    if (route.name === "home") {
      view.appendChild(buildHome(db));
    } else if (route.name === "search") {
      view.appendChild(buildSearch(db, route.q));
    } else if (route.name === "tag") {
      view.appendChild(buildTag(db, route.tag));
    } else if (route.name === "bookmark") {
      view.appendChild(buildBookmarkDetail(fetchBookmark(db, route.uid), db));
    }
  }

  // ── Boot ──────────────────────────────────────────────────────────────────
  try {
    const db = await loadDb();
    statusEl.textContent = "ready";
    render(db);
    window.addEventListener("hashchange", () => render(db));

    let searchTimer = 0;
    searchEl.addEventListener("input", () => {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(() => {
        const q = searchEl.value.trim();
        if (!q) {
          if (location.hash !== "#/") location.hash = "#/";
        } else {
          location.hash = "#/search/" + encodeURIComponent(q);
        }
      }, 140);
    });
  } catch (err) {
    console.error(err);
    clear(view);
    const p = document.createElement("p");
    p.className = "empty";
    p.textContent = "Could not load database: " + (err.message || String(err));
    view.appendChild(p);
    statusEl.textContent = "error";
  }
})();
</script>
</body>
</html>
